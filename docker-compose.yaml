services:
  redis:
    image: redis:latest
    ports:
      - 6379:6379

  postgres:
    image: postgres:17.4-alpine
    environment:
      - POSTGRES_PASSWORD=front
      - POSTGRES_USER=front
      - POSTGRES_DB=front
    volumes:
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/init-user-db.sh

  migrator-front:
    build:
      context: .
      dockerfile: Alembic.Dockerfile
    depends_on:
      - postgres
      - redis

  front:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - migrator-front
      - redis
      - postgres
    ports:
      - "8181:8080"


